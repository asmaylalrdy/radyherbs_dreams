<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rady Healing & Dreams</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#87ceeb">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root {
            --rady-blue: #87ceeb;
            --rady-green: #4caf50;
            --rady-yellow: #ffc107;
            --soft-bg: #f0f7f9;
        }

        /* منع التداخل وضمان استقرار الشاشة */
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: var(--soft-bg);
            font-family: 'Segoe UI', sans-serif;
        }

        /* صفحة الترحيب */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        #splash-screen img { width: 150px; border-radius: 50%; border: 4px solid var(--rady-green); }

        /* الواجهة الرئيسية */
        .main-app { display: none; padding-bottom: 50px; }

        .header {
            background: linear-gradient(180deg, var(--rady-blue), #ffffff);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--rady-green);
            position: sticky; top: 0; z-index: 100;
        }

        .logo-box {
            width: 80px; height: 80px; margin: 0 auto;
            background: white; border-radius: 50%; overflow: hidden;
            border: 2px solid var(--rady-green);
        }

        .logo-box img { width: 100%; height: 100%; object-fit: cover; }

        .container { padding: 15px; max-width: 500px; margin: 0 auto; }

        .card {
            background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        input {
            width: 100%; padding: 12px; margin: 10px 0;
            border: 2px solid #e1f0f7; border-radius: 12px; box-sizing: border-box;
        }

        button {
            background: var(--rady-green); color: white; border: none;
            padding: 12px; border-radius: 12px; width: 100%; font-weight: bold;
        }

        /* منطقة الإجابة الذكية */
        #result-display {
            display: none; background: #fff; border-radius: 15px; padding: 15px;
            margin-top: 10px; border-right: 5px solid var(--rady-yellow);
            max-height: 200px; overflow-y: auto; /* يسمح بالتمرير إذا كانت الإجابة طويلة */
        }

        /* قسم الإعدادات (حول المطور) */
        .about-section {
            font-size: 0.8em; text-align: center; color: #7f8c8d; margin-top: 20px;
            border-top: 1px solid #ddd; padding-top: 15px;
        }

        .about-section a { color: var(--rady-blue); text-decoration: none; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="IMG-20250801-WA0004 (3).jpeg" alt="Logo">
        <h2 style="color: var(--rady-blue);">Rady Healing & Dreams</h2>
        <p>جاري تهيئة النظام البيئي...</p>
    </div>

    <div class="main-app" id="app-content">
        <div class="header">
            <div class="logo-box">
                <img src="IMG-20250801-WA0004 (3).jpeg" alt="Logo">
            </div>
            <h1 style="font-size: 1.2rem; margin: 5px 0;">رضي للعلاج والأحلام</h1>
        </div>

        <div class="container">
            <div class="card">
                <h3>🌿 الأعشاب والمنفعة</h3>
                <input type="text" id="herb-q" placeholder="بماذا تشعر؟">
                <button onclick="handleSearch('herbs')">اطلب الوصفة</button>
            </div>

            <div class="card">
                <h3>🌙 تفسير الرؤى</h3>
                <input type="text" id="dream-q" placeholder="ماذا رأيت؟">
                <button onclick="handleSearch('dreams')">فسر الآن</button>
            </div>

            <div id="result-display"></div>

            <div class="about-section">
                <p>إصدار التطبيق: v1.0.2 (Pi Mainnet Ready)</p>
                <p>المشرف والمطور: <strong>Ismail Ahmed Ismail</strong></p>
                <p>تواصل: <a href="mailto:asmaylalrdy744@gmail.com">asmaylalrdy744@gmail.com</a></p>
                <p><a href="https://github.com/asmaylalrdy744">تابعنا على GitHub</a></p>
            </div>
        </div>
    </div>

    <script>
        // إخفاء صفحة الترحيب بعد 2.5 ثانية
        setTimeout(() => {
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
            }, 500);
        }, 2500);

        const localDB = {
            herbs: { "صداع": "مغلي البابونج وتدليك الصدغ بزيت النعناع.", "قولون": "اليانسون والشمر دافئاً." },
            dreams: { "بحر": "رزق واسع واستقرار.", "طيران": "سفر أو مكانة رفيعة." }
        };

        function handleSearch(type) {
            const val = document.getElementById(type === 'herbs' ? 'herb-q' : 'dream-q').value;
            const res = document.getElementById('result-display');
            let match = Object.keys(localDB[type]).find(k => val.includes(k));
            
            res.style.display = "block";
            if (match) {
                res.innerHTML = `<strong>النتيجة:</strong><br>${localDB[type][match]}`;
            } else {
                res.innerHTML = "<strong>تنبيه:</strong> لم نجد هذه الحالة في القاعدة المحلية. سيتم ربط الخدمة بذكاء Gemini قريباً لتوفير إجابات شاملة.";
            }
            // التمرير تلقائياً للإجابة
            res.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
