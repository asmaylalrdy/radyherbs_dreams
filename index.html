<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rady Healing & Dreams | رضي للعلاج والأحلام</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#87ceeb">
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    
    <style>
        :root {
            --rady-sky-blue: #87ceeb; /* لون خلفية شعارك */
            --rady-leaf-green: #4caf50; /* لون الأوراق في شعارك */
            --rady-moon-yellow: #ffc107; /* لون الهلال */
            --soft-white: #fdfdfd;
            --text-dark: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f7f9;
            color: var(--text-dark);
        }

        /* تنسيق الهيدر المستوحى من ألوان الشعار */
        .header {
            background: linear-gradient(180deg, var(--rady-sky-blue), #ffffff);
            padding: 40px 20px;
            text-align: center;
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .logo-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 3px solid var(--rady-leaf-green);
        }

        .logo-container img {
            width: 90%;
            height: auto;
        }

        h1 { margin: 10px 0; font-size: 1.5rem; color: #2980b9; }

        .wisdom-tag {
            background: var(--rady-leaf-green);
            color: white;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 25px;
            font-size: 0.85em;
            margin-top: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            padding: 20px;
            max-width: 500px;
            margin: -20px auto 0;
        }

        .card {
            background: var(--soft-white);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid rgba(135, 206, 235, 0.3);
        }

        h3 { margin-top: 0; color: var(--rady-leaf-green); display: flex; align-items: center; gap: 10px; }

        input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #e1f0f7;
            border-radius: 15px;
            box-sizing: border-box;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus { border-color: var(--rady-sky-blue); outline: none; background: #fff; }

        .btn-wrapper { display: flex; justify-content: center; }

        button {
            background: linear-gradient(to left, var(--rady-leaf-green), #66bb6a);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1.1em;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
            transition: all 0.3s ease;
            white-space: nowrap; /* يضمن ظهور النص كاملاً مثل "فسر الآن" */
        }

        button:active { transform: scale(0.97); }

        #result-display {
            display: none;
            background: #ffffff;
            border-radius: 20px;
            padding: 20px;
            margin-top: 10px;
            border-right: 6px solid var(--rady-moon-yellow);
            line-height: 1.8;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-container">
            <img src="icon-192.png" alt="Rady Healing Logo" onerror="this.src='https://via.placeholder.com/100?text=Rady'">
        </div>
        <h1>Rady Healing & Dreams</h1>
        <div id="wisdom-display" class="wisdom-tag">جاري التحميل...</div>
    </div>

    <div class="container">
        <div class="card">
            <h3>🌿 العلاج بالأعشاب الطبيعية</h3>
            <input type="text" id="herb-search" placeholder="بماذا تشعر؟ (صداع، أرق، معدة)...">
            <div class="btn-wrapper">
                <button onclick="executeSearch('herbs')">اطلب الوصفة العشبية الآن</button>
            </div>
        </div>

        <div class="card">
            <h3>🌙 تفسير الأحلام (ابن سيرين)</h3>
            <input type="text" id="dream-search" placeholder="اكتب رمز حلمك (بحر، طيران، ذهب)...">
            <div class="btn-wrapper">
                <button onclick="executeSearch('dreams')">فسر رؤيتك الآن</button>
            </div>
        </div>

        <div id="result-display"></div>
    </div>

    <script>
        // قاعدة البيانات الموسعة والشاملة
        const radyData = {
            herbs: {
                "صداع": "يُنصح بمغلي البابونج أو إكليل الجبل، وتدليك الصدغين بزيت النعناع.",
                "أرق": "شرب كوب دافئ من الحليب مع العسل أو مغلي نبتة اللافندر (الخزامى) قبل النوم.",
                "معدة": "الكمون المغلي أو القرفة تساعد في طرد الغازات وتهدئة تشنجات الجهاز الهضمي.",
                "سعال": "ورق الجوافة المغلي هو الصديق الأول للصدر، أو ملعقة عسل مع ليمون دافئ.",
                "قولون": "اليانسون والشمر هما الأفضل لتهدئة القولون العصبي، مع تجنب البقوليات.",
                "مفاصل": "دهن المنطقة بزيت الزيتون الدافئ مع الزنجبيل يساعد في تخفيف الالتهاب.",
                "برد": "مغلي الزعتر البري مع الليمون غني بمضادات الأكسدة ويقوي المناعة.",
                "تركيز": "لبان الذكر المنقوع أو شرب إكليل الجبل يحسن الذاكرة والنشاط الذهني."
            },
            dreams: {
                "بحر": "البحر الهادئ رزق واسع، أما الموج العالي فقد يرمز لفتنة أو تحديات في العمل.",
                "طيران": "الطيران بلا أجنحة سفر أو تغيير حال للأفضل، والطيران فوق البيوت نيل مكانة.",
                "ذهب": "رؤية الذهب للنساء خير وزينة، وللرجال قد يرمز لبعض الهموم أو الالتزامات المالية.",
                "ماء": "الماء الصافي حياة طيبة ونجاة من كرب، وشربه زيادة في العلم والرزق.",
                "نار": "النار قد ترمز للفتنة إذا كانت مؤذية، أو الهداية والرزق إذا كانت للإضاءة أو الطبخ.",
                "مطر": "المطر رحمة وخير عام، وإذا كان غزيراً بلا ضرر فهو استجابة دعاء وقضاء دين.",
                "خبز": "الخبز يرمز للإسلام أو العلم أو لقمة العيش الحلال، والخبز الأبيض رغد في العيش.",
                "سقوط": "السقوط من مكان عالٍ قد يرمز لتغيير في المهنة أو القلق من الفشل في أمر ما.",
                "ثعبان": "الثعبان غالباً يرمز لعدو، وحجمه وقوته يحددان قوة هذا العدو، وقتله نصر.",
                "كعبة": "رؤية الكعبة بشارة خير، قد تعني الحج أو القرب من شخص ذو سلطة عادلة."
            },
            wisdoms: [
                "الصحة ثروة الإنسان العاقل، فلا تفرط فيها.",
                "اجعل طعامك دواءك، ولا تجعل دواءك طعامك.",
                "من عرف الداء، هان عليه الدواء.",
                "الوقاية خير من قنطار من العلاج.",
                "النفس الطيبة تسكن في الجسم السليم.",
                "الحياة أمل، فمن فقد الأمل فقد الحياة."
            ]
        };

        function executeSearch(category) {
            const inputId = category === 'herbs' ? 'herb-search' : 'dream-search';
            const userText = document.getElementById(inputId).value;
            const output = document.getElementById('result-display');
            
            // البحث عن الكلمة المفتاحية داخل النص المكتوب
            let match = Object.keys(radyData[category]).find(key => userText.includes(key));
            
            output.style.display = "block";
            if (match) {
                output.innerHTML = `<strong>التحليل والمراجع:</strong><br>${radyData[category][match]}`;
            } else {
                output.innerHTML = "<strong>تنبيه:</strong> لم نجد هذه المفردة حالياً، حاول كتابة الكلمة الأساسية فقط (مثلاً: 'بحر' بدلاً من 'رأيت بحراً كبيراً').";
            }
        }

        // تحديث حكمة اليوم عشوائياً عند كل دخول
        const randomIndex = new Date().getDate() % radyData.wisdoms.length;
        document.getElementById('wisdom-display').innerText = "حكمة اليوم: " + radyData.wisdoms[randomIndex];

        // تسجيل الـ Service Worker للعمل أوفلاين
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => console.log("SW Status: Offline Cache Active"));
            });
        }

        // تهيئة Pi SDK للعمل داخل النظام البيئي
        try {
            window.Pi.init({ version: "2.0", sandbox: true });
        } catch(e) { console.log("Running outside Pi Browser"); }
    </script>
</body>
</html>
