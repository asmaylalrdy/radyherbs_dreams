<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رضي للأعشاب والأحلام</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#5e2d89">
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    
    <style>
        :root {
            --pi-purple: #5e2d89;
            --success-green: #2ecc71;
            --light-bg: #f4f7f6;
            --card-shadow: 0 10px 20px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light-bg);
            color: #2c3e50;
        }

        /* تنسيق الهيدر مع مساحة للشعار */
        .header {
            background: linear-gradient(135deg, var(--pi-purple), #8e44ad);
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .logo-placeholder {
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .logo-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .wisdom-tag {
            background: rgba(255, 255, 255, 0.15);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            margin-top: 10px;
        }

        .container {
            padding: 20px;
            max-width: 500px;
            margin: -30px auto 0;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: var(--card-shadow);
            border-top: 4px solid var(--pi-purple);
        }

        h3 { margin-top: 0; color: var(--pi-purple); display: flex; align-items: center; gap: 8px; }

        input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: 2px solid #eee;
            border-radius: 12px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--pi-purple); outline: none; }

        .btn-box { display: flex; justify-content: center; }

        button {
            background: var(--success-green);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1.1em;
            transition: all 0.3s ease;
            white-space: nowrap; /* حل مشكلة تداخل النص */
        }

        button:active { transform: scale(0.98); background: #27ae60; }

        #result-area {
            display: none;
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            margin-top: 10px;
            border: 2px solid var(--success-green);
            line-height: 1.8;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-placeholder">
            <img src="icon-192.png" alt="Logo" onerror="this.src='https://via.placeholder.com/80?text=Rady'">
        </div>
        <h1>Rady Herbs & Dreams</h1>
        <div id="wisdom-box" class="wisdom-tag">جاري تحميل حكمة اليوم...</div>
    </div>

    <div class="container">
        <div class="card">
            <h3>🌿 طب الأعشاب والعلاجات</h3>
            <input type="text" id="herb-in" placeholder="اكتب العرض (مثلاً: صداع، قولون، أرق)...">
            <div class="btn-box">
                <button onclick="processSearch('herbs')">اكتشف العلاج العشبي الآن</button>
            </div>
        </div>

        <div class="card">
            <h3>🌙 تفسير الأحلام (ابن سيرين)</h3>
            <input type="text" id="dream-in" placeholder="ماذا رأيت؟ (مثلاً: بحر، طيران، ذهب)...">
            <div class="btn-box">
                <button onclick="processSearch('dreams')">فسر رؤيتك الآن</button>
            </div>
        </div>

        <div id="result-area"></div>
    </div>

    <script>
        // القائمة الموسعة والشاملة كما طلبت
        const appDatabase = {
            herbs: {
                "صداع": "يُنصح بمغلي البابونج أو إكليل الجبل، وتدليك الصدغين بزيت النعناع.",
                "أرق": "شرب كوب دافئ من الحليب مع العسل أو مغلي نبتة اللافندر (الخزامى) قبل النوم.",
                "معدة": "الكمون المغلي أو القرفة تساعد في طرد الغازات وتهدئة تشنجات الجهاز الهضمي.",
                "سعال": "ورق الجوافة المغلي هو الصديق الأول للصدر، أو ملعقة عسل مع ليمون دافئ.",
                "قولون": "اليانسون والشمر هما الأفضل لتهدئة القولون العصبي، مع تجنب البقوليات.",
                "مفاصل": "دهن المنطقة بزيت الزيتون الدافئ مع الزنجبيل يساعد في تخفيف الالتهاب.",
                "برد": "مغلي الزعتر البري مع الليمون غني بمضادات الأكسدة ويقوي المناعة.",
                "تركيز": "لبان الذكر المنقوع أو شرب إكليل الجبل يحسن الذاكرة والنشاط الذهني."
            },
            dreams: {
                "بحر": "البحر الهادئ رزق واسع، أما الموج العالي فقد يرمز لفتنة أو تحديات في العمل.",
                "طيران": "الطيران بلا أجنحة سفر أو تغيير حال للأفضل، والطيران فوق البيوت نيل مكانة.",
                "ذهب": "رؤية الذهب للنساء خير وزينة، وللرجال قد يرمز لبعض الهموم أو الالتزامات المالية.",
                "ماء": "الماء الصافي حياة طيبة ونجاة من كرب، وشربه زيادة في العلم والرزق.",
                "نار": "النار قد ترمز للفتنة إذا كانت مؤذية، أو الهداية والرزق إذا كانت للإضاءة أو الطبخ.",
                "مطر": "المطر رحمة وخير عام، وإذا كان غزيراً بلا ضرر فهو استجابة دعاء وقضاء دين.",
                "خبز": "الخبز يرمز للإسلام أو العلم أو لقمة العيش الحلال، والخبز الأبيض رغد في العيش.",
                "سقوط": "السقوط من مكان عالٍ قد يرمز لتغيير في المهنة أو القلق من الفشل في أمر ما.",
                "ثعبان": "الثعبان غالباً يرمز لعدو، وحجمه وقوته يحددان قوة هذا العدو، وقتله نصر.",
                "كعبة": "رؤية الكعبة بشارة خير، قد تعني الحج أو القرب من شخص ذو سلطة عادلة."
            },
            wisdoms: [
                "الصحة ثروة الإنسان العاقل، فلا تفرط فيها.",
                "اجعل طعامك دواءك، ولا تجعل دواءك طعامك.",
                "من عرف الداء، هان عليه الدواء.",
                "الوقاية خير من قنطار من العلاج.",
                "النفس الطيبة في الجسم السليم.",
                "الحياة أمل، فمن فقد الأمل فقد الحياة."
            ]
        };

        function processSearch(type) {
            const id = type === 'herbs' ? 'herb-in' : 'dream-in';
            const val = document.getElementById(id).value;
            const res = document.getElementById('result-area');
            
            // محرك بحث مرن يبحث عن الكلمة داخل الجملة
            let found = Object.keys(appDatabase[type]).find(k => val.includes(k));
            
            res.style.display = "block";
            if (found) {
                res.innerHTML = `<strong>التحليل والمراجع:</strong><br>${appDatabase[type][found]}`;
            } else {
                res.innerHTML = "<strong>تنبيه:</strong> لم نجد هذه المفردة في مراجعنا الحالية، حاول كتابة الكلمة الأساسية فقط.";
            }
        }

        // تحديث حكمة اليوم
        const day = new Date().getDate() % appDatabase.wisdoms.length;
        document.getElementById('wisdom-box').innerText = "حكمة اليوم: " + appDatabase.wisdoms[day];

        // تسجيل الـ PWA للعمل بدون إنترنت
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => console.log("SW Error"));
            });
        }

        // تهيئة Pi SDK
        try {
            window.Pi.init({ version: "2.0", sandbox: true });
        } catch(e) {}
    </script>
</body>
</html>
