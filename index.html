<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rady Healing & Dreams</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#87ceeb">
    <style>
        :root {
            --rady-blue: #87ceeb;
            --rady-green: #4caf50;
            --rady-yellow: #ffc107;
            --bg-color: #f0f7f9;
        }

        body, html {
            height: 100%; margin: 0; padding: 0;
            overflow: hidden; background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* صفحة الترحيب (Splash Screen) */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.8s ease;
        }

        #splash img { width: 160px; border-radius: 50%; border: 5px solid var(--rady-green); margin-bottom: 20px; }

        /* الهيكل الرئيسي لمنع اختفاء العناصر */
        .app-wrapper {
            display: none; height: 100vh; display: flex; flex-direction: column;
        }

        .header {
            background: linear-gradient(180deg, var(--rady-blue), #ffffff);
            padding: 15px; text-align: center; border-bottom: 3px solid var(--rady-green);
            flex-shrink: 0; /* يمنع الهيدر من الانكماش أو الاختفاء */
        }

        .content-scroll {
            flex-grow: 1; overflow-y: auto; padding: 15px;
        }

        .card {
            background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid rgba(135, 206, 235, 0.3);
        }

        input {
            width: 100%; padding: 12px; margin: 10px 0;
            border: 2px solid #e1f0f7; border-radius: 12px; box-sizing: border-box;
        }

        button {
            background: var(--rady-green); color: white; border: none;
            padding: 14px; border-radius: 12px; width: 100%; font-weight: bold;
            font-size: 1.1em; cursor: pointer; transition: 0.3s;
        }

        button:active { transform: scale(0.98); }

        /* صندوق النتائج الذكي */
        #result-display {
            display: none; background: #fff; border-radius: 15px; padding: 15px;
            margin-top: 10px; border-right: 6px solid var(--rady-yellow);
            line-height: 1.6; border-left: 1px solid #eee; border-bottom: 1px solid #eee;
        }

        /* معلومات المطور (About) */
        .about-info {
            text-align: center; font-size: 0.85em; color: #7f8c8d;
            padding: 20px; border-top: 1px solid #ddd; margin-top: 10px;
        }

        .about-info a { color: var(--rady-green); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="splash">
        <img src="IMG-20250801-WA0004 (3).jpeg" alt="Rady Logo">
        <h2 style="color: var(--rady-blue); margin: 0;">Rady Healing & Dreams</h2>
        <p style="color: #7f8c8d;">مرحباً بك في عالم الصحة والرؤى</p>
    </div>

    <div class="app-wrapper" id="main-content" style="display: none;">
        <div class="header">
            <div style="width: 60px; height: 60px; margin: 0 auto; border-radius: 50%; overflow: hidden; border: 2px solid var(--rady-green);">
                <img src="IMG-20250801-WA0004 (3).jpeg" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <h1 style="font-size: 1.2rem; margin: 8px 0; color: #2c3e50;">رضي للعلاج والأحلام</h1>
        </div>

        <div class="content-scroll">
            <div class="card">
                <h3 style="color: var(--rady-green); margin-top: 0;">🌿 مستشارك العشبي</h3>
                <input type="text" id="herb-input" placeholder="اكتب ما تشعر به (مثلاً: ألم الركبة)...">
                <button onclick="processRequest('herbs')">اطلب الوصفة الآن</button>
            </div>

            <div class="card">
                <h3 style="color: #9b59b6; margin-top: 0;">🌙 مفسر الأحلام الذكي</h3>
                <input type="text" id="dream-input" placeholder="اكتب رمز حلمك (مثلاً: طيران)...">
                <button onclick="processRequest('dreams')" style="background: #9b59b6;">فسر حلمك الآن</button>
            </div>

            <div id="result-display"></div>

            <div class="about-info">
                <p>إصدار التطبيق: v1.0.2 (Pi Network Ready)</p>
                <p>المشرف والمطور: <strong>Ismail Ahmed Ismail</strong></p>
                <p>GitHub: <a href="https://github.com/asmaylalrdy744" target="_blank">asmaylalrdy744</a></p>
                <p>Email: <a href="mailto:asmaylalrdy744@gmail.com">asmaylalrdy744@gmail.com</a></p>
            </div>
        </div>
    </div>

    <script>
        // التحكم في صفحة الترحيب
        window.onload = () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    document.getElementById('main-content').style.display = 'flex';
                }, 800);
            }, 3000); // تظهر لمدة 3 ثوانٍ
        };

        // دالة المعالجة وربط الذكاء الاصطناعي
        async function processRequest(type) {
            const input = document.getElementById(type === 'herbs' ? 'herb-input' : 'dream-input').value;
            const display = document.getElementById('result-display');
            
            if (!input) return;

            display.style.display = "block";
            display.innerHTML = "<strong>جاري التفكير...</strong> جاري استشارة الذكاء الاصطناعي لتوفير أدق إجابة لك.";

            // هنا نضع الكود الذي سيتحدث مع Gemini API مستقبلاً
            // في الوقت الحالي سنقوم بمحاكاة الرد الذكي لضمان عمل الواجهة
            setTimeout(() => {
                display.innerHTML = `<strong>الرد الذكي:</strong><br>لقد استقبلنا استفسارك حول "${input}". نحن نقوم الآن بربط محرك Gemini لتوفير إجابة موسوعة شاملة. بصفتك المطور <strong>Ismail</strong>، يمكنك الآن وضع مفتاح الـ API الخاص بك هنا لتفعيل الإجابات الحية لآلاف الأمراض.`;
                display.scrollIntoView({ behavior: 'smooth' });
            }, 1500);
        }
    </script>
</body>
</html>
