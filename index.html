<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Rady Herbs & Dreams</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body {
      font-family: Tahoma;
      background: linear-gradient(to right, #eef2f3, #ffffff);
      text-align: center;
      padding: 20px;
      direction: rtl;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
      max-width: 420px;
      margin: auto;
    }

    button {
      padding: 12px;
      margin: 8px;
      border: none;
      border-radius: 10px;
      background: #2e8b57;
      color: white;
      font-size: 16px;
      cursor: pointer;
      width: 90%;
    }

    input {
      padding: 10px;
      width: 85%;
      margin: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button:hover {
      background: #246b45;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🌿 Rady Herbs & Dreams</h2>

  <!-- تسجيل الدخول -->
  <button onclick="loginWithPi()">تسجيل الدخول عبر Pi</button>

  <p><strong>👤 المستخدم:</strong> <span id="username">-</span></p>
  <p><strong>👛 المحفظة:</strong> <span id="wallet">-</span></p>

  <hr>

  <!-- سؤال المستخدم -->
  <h3>💬 اسأل عن الأعشاب أو الأحلام</h3>

  <input type="text" id="question" placeholder="اكتب سؤالك هنا">
  <button onclick="answerQuestion()">إرسال السؤال</button>

  <p id="answer"></p>

  <hr>

  <!-- المنتجات -->
  <h3>🛒 منتجات مدفوعة</h3>

  <button onclick="buyProduct('herbs')">وصفات علاجية 🌿 (1 Pi)</button>
  <button onclick="buyProduct('dreams')">تفسير أحلام 🔮 (1 Pi)</button>

  <p id="status"></p>
</div>

<script>
const Pi = window.Pi;
Pi.init({ version: "2.0" });

let currentUser = null;

// تسجيل الدخول
async function loginWithPi() {
  try {
    const scopes = ['username', 'payments'];

    const auth = await Pi.authenticate(scopes, function(payment) {
      console.log(payment);
    });

    currentUser = auth.user;

    document.getElementById("username").innerText = auth.user.username;
    document.getElementById("wallet").innerText = auth.wallet_address;
    document.getElementById("status").innerText = "✅ تم تسجيل الدخول";

  } catch (error) {
    document.getElementById("status").innerText = "❌ فشل تسجيل الدخول";
  }
}

// الرد على الأسئلة (حل مشكلتك 🔥)
function answerQuestion() {
  const q = document.getElementById("question").value;

  if (!q) {
    document.getElementById("answer").innerText = "⚠️ اكتب سؤال أولاً";
    return;
  }

  let response = "";

  if (q.includes("صداع")) {
    response = "🌿 لعلاج الصداع: جرب شاي النعناع أو الزنجبيل.";
  } else if (q.includes("حلم")) {
    response = "🔮 تفسير عام: الحلم يدل على رسالة داخلية تحتاج فهم.";
  } else {
    response = "🤖 سيتم تطوير الذكاء لاحقاً للإجابة بشكل أدق.";
  }

  document.getElementById("answer").innerText = response;
}

// الدفع
function buyProduct(type) {
  if (!currentUser) {
    alert("يجب تسجيل الدخول أولاً");
    return;
  }

  let productName = type === 'herbs' ? "وصفات علاجية" : "تفسير أحلام";

  const paymentData = {
    amount: 1,
    memo: productName,
    metadata: { product: type }
  };

  Pi.createPayment(paymentData, {
    onReadyForServerApproval: function(paymentId) {
      console.log(paymentId);
    },
    onReadyForServerCompletion: function(paymentId, txid) {
      document.getElementById("status").innerText = "✅ تم الدفع بنجاح";
    },
    onCancel: function() {
      document.getElementById("status").innerText = "❌ تم إلغاء الدفع";
    },
    onError: function() {
      document.getElementById("status").innerText = "❌ خطأ في الدفع";
    }
  });
}
</script>

</body>
</html>
